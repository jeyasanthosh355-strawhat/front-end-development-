<!DOCTYPE html>
<html>
<head>
    <title>Hover and Transition Example</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        /* Button Style */
        .btn {
            background-color: blue;
            color: white;
            padding: 12px 20px;
            border: none;
            font-size: 16px;
            cursor: pointer;

            /* Transition */
            transition: all 0.3s ease;
        }

        /* Hover Effect */
        .btn:hover {
            background-color: red;
            transform: scale(1.2);
        }

        /* Box Style */
        .box {
            width: 150px;
            height: 150px;
            background-color: green;
            margin: 40px auto;

            /* Transition */
            transition: all 0.5s ease;
        }

        /* Box Hover */
        .box:hover {
            background-color: orange;
            transform: rotate(20deg);
        }
    </style>
</head>

<body>

    <h2>Hover and Transition Demo</h2>

    <button class="btn">Hover Me</button>

    <div class="box"></div>

</body>
</html>
